<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Email Series | Founder Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/styles/founder-admin.css">
    <script src="/config.js"></script>
    <script src="/auth.js"></script>
    <script src="/js/founder-admin-common.js"></script>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <h2>Founder Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <button id="loginButton" class="btn btn-primary">Send Magic Link</button>
        <p id="loginStatus"></p>
    </div>

    <div class="admin-layout" id="mainContent" style="display:none">
        <header class="admin-header">
            <h1><a href="/founder_admin.html" style="text-decoration:none;color:inherit;">Founder Admin</a> &rsaquo; Lead Email Series</h1>
            <button id="logoutBtn" class="btn btn-ghost">Logout</button>
        </header>

        <div class="admin-body" style="display:flex;gap:20px;padding:20px;">
            <!-- Left: Series list -->
            <div style="width:340px;flex-shrink:0;">
                <h3>Email Series</h3>
                <div id="seriesList" style="display:flex;flex-direction:column;gap:8px;margin-top:12px;">
                    <p class="muted">Loading...</p>
                </div>
            </div>

            <!-- Right: Series detail -->
            <div style="flex:1;min-width:0;">
                <div id="seriesDetail" style="display:none;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                        <div>
                            <h2 id="detailClientName"></h2>
                            <p class="muted" id="detailEmail"></p>
                        </div>
                        <div style="display:flex;gap:8px;">
                            <button id="pauseBtn" class="btn btn-ghost">Pause Series</button>
                            <button id="resumeBtn" class="btn btn-ghost">Resume Series</button>
                        </div>
                    </div>

                    <!-- Tabs -->
                    <div style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;">
                        <button class="tab-btn active" data-tab="emails">Emails</button>
                        <button class="tab-btn" data-tab="deck">Deck Content</button>
                        <button class="tab-btn" data-tab="analysis">Full Analysis</button>
                    </div>

                    <!-- Emails tab -->
                    <div id="tab-emails" class="tab-content">
                        <div id="emailTimeline"></div>
                    </div>

                    <!-- Deck tab -->
                    <div id="tab-deck" class="tab-content" style="display:none;">
                        <div id="deckContent" style="white-space:pre-wrap;font-size:14px;line-height:1.6;max-height:600px;overflow-y:auto;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;"></div>
                        <div id="gammaLink" style="margin-top:12px;"></div>
                    </div>

                    <!-- Analysis tab -->
                    <div id="tab-analysis" class="tab-content" style="display:none;">
                        <div id="analysisContent" style="white-space:pre-wrap;font-size:14px;line-height:1.6;max-height:600px;overflow-y:auto;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;"></div>
                    </div>
                </div>

                <div id="emptyState" style="text-align:center;padding:60px 20px;color:var(--muted);">
                    <p>Select an email series from the left to view details.</p>
                </div>
            </div>
        </div>
    </div>

    <style>
        .tab-btn { background:none; border:none; padding:8px 16px; cursor:pointer; font-size:14px; color:var(--muted); border-bottom:2px solid transparent; }
        .tab-btn.active { color:var(--text); border-bottom-color:var(--brand-color, #1a73e8); font-weight:600; }
        .series-card { padding:12px; border:1px solid var(--border); border-radius:6px; cursor:pointer; background:var(--surface); }
        .series-card:hover { border-color:var(--brand-color, #1a73e8); }
        .series-card.active { border-color:var(--brand-color, #1a73e8); background:#f0f4ff; }
        .email-row { padding:12px; border:1px solid var(--border); border-radius:6px; margin-bottom:8px; }
        .email-row .status-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
        .status-badge.queued { background:#e8f0fe; color:#1a73e8; }
        .status-badge.sent { background:#f0fdf4; color:#22c55e; }
        .status-badge.paused { background:#fef3c7; color:#d97706; }
        .status-badge.cancelled { background:#fee2e2; color:#dc2626; }
        .status-badge.failed { background:#fee2e2; color:#dc2626; }
        .muted { color: var(--muted, #718096); font-size: 13px; }
    </style>

    <script type="module">
        const API = window.APP_CONFIG?.API_BASE_URL || 'http://localhost:8000';
        const headers = () => window.Auth?.getAuthHeaders() || {};

        let currentRunId = null;

        // Load series list
        async function loadSeries() {
            try {
                const res = await fetch(`${API}/api/founder-admin/lead-emails`, { headers: headers() });
                if (!res.ok) return;
                const data = await res.json();
                const list = document.getElementById('seriesList');
                if (!data.length) { list.innerHTML = '<p class="muted">No email series yet.</p>'; return; }
                list.innerHTML = data.map(s => `
                    <div class="series-card" data-run-id="${s.run_id}">
                        <strong>${s.client_name}</strong>
                        <div class="muted">${s.email_address}</div>
                        <div style="margin-top:4px;font-size:12px;">
                            ${s.sent_count} sent · ${s.queued_count} queued · ${s.paused_count} paused
                        </div>
                    </div>
                `).join('');

                list.querySelectorAll('.series-card').forEach(card => {
                    card.addEventListener('click', () => loadDetail(card.dataset.runId));
                });
            } catch (e) { console.error('Failed to load series:', e); }
        }

        // Load series detail
        async function loadDetail(runId) {
            currentRunId = runId;
            document.querySelectorAll('.series-card').forEach(c => c.classList.remove('active'));
            document.querySelector(`.series-card[data-run-id="${runId}"]`)?.classList.add('active');

            try {
                const res = await fetch(`${API}/api/founder-admin/lead-emails/${runId}`, { headers: headers() });
                if (!res.ok) return;
                const data = await res.json();

                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('seriesDetail').style.display = '';
                document.getElementById('detailClientName').textContent = data.company_name || data.client_name;
                document.getElementById('detailEmail').textContent = data.email_address;

                // Emails timeline
                const timeline = document.getElementById('emailTimeline');
                timeline.innerHTML = data.emails.map(em => `
                    <div class="email-row">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <div>
                                <strong>Email ${em.sequence_number}</strong>
                                <span class="status-badge ${em.status}">${em.status}</span>
                            </div>
                            <div class="muted">${em.scheduled_for ? new Date(em.scheduled_for).toLocaleDateString() + ' ' + new Date(em.scheduled_for).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : ''}</div>
                        </div>
                        <div style="margin-top:4px;"><strong>${em.subject}</strong></div>
                        ${em.preview_text ? `<div class="muted">${em.preview_text}</div>` : ''}
                        ${em.sent_at ? `<div class="muted">Sent: ${new Date(em.sent_at).toLocaleString()}</div>` : ''}
                        ${em.error_message ? `<div style="color:#dc2626;font-size:12px;">${em.error_message}</div>` : ''}
                        ${em.status === 'queued' || em.status === 'paused' ? `<button class="btn btn-ghost" style="margin-top:4px;font-size:12px;" onclick="cancelEmail('${em.id}')">Cancel</button>` : ''}
                    </div>
                `).join('');

                // Deck content
                const deckEl = document.getElementById('deckContent');
                deckEl.textContent = data.deck_markdown || 'No deck content available.';
                const gammaEl = document.getElementById('gammaLink');
                gammaEl.innerHTML = data.gamma_url ? `<a href="${data.gamma_url}" target="_blank" class="btn btn-primary">View Gamma Deck</a>` : '';

                // Analysis
                const analysisEl = document.getElementById('analysisContent');
                analysisEl.textContent = data.voc_markdown || 'No analysis available.';

            } catch (e) { console.error('Failed to load detail:', e); }
        }

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
                btn.classList.add('active');
                document.getElementById(`tab-${btn.dataset.tab}`).style.display = '';
            });
        });

        // Pause/Resume
        document.getElementById('pauseBtn').addEventListener('click', async () => {
            if (!currentRunId) return;
            await fetch(`${API}/api/founder-admin/lead-emails/${currentRunId}/pause`, { method: 'POST', headers: headers() });
            loadDetail(currentRunId);
        });
        document.getElementById('resumeBtn').addEventListener('click', async () => {
            if (!currentRunId) return;
            await fetch(`${API}/api/founder-admin/lead-emails/${currentRunId}/resume`, { method: 'POST', headers: headers() });
            loadDetail(currentRunId);
        });

        // Cancel single email
        window.cancelEmail = async (emailId) => {
            await fetch(`${API}/api/founder-admin/lead-emails/${emailId}/cancel`, { method: 'POST', headers: headers() });
            if (currentRunId) loadDetail(currentRunId);
        };

        // Init
        window.Auth?.checkAuth().then(user => {
            if (user?.is_founder) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainContent').style.display = '';
                loadSeries();
            }
        });
        document.getElementById('logoutBtn')?.addEventListener('click', () => window.Auth?.handleLogout());
    </script>
</body>
</html>
