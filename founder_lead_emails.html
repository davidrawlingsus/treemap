<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founder Admin - Lead Email Series</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/styles/founder-admin.css">
    <link rel="stylesheet" href="/styles/founder-lead-emails.css">
    <script src="/config.js"></script>
    <script src="/auth.js"></script>
</head>
<body>
    <div id="loginOverlay" class="login-overlay hidden">
        <div class="login-container">
            <div id="loginFormSection">
                <h2>Sign in</h2>
                <p class="login-subtext">Enter your work email and we'll email you a secure magic link.</p>
                <input type="email" id="loginEmail" placeholder="you@company.com" autocomplete="email">
                <button id="loginButton" type="button">Send Magic Link</button>
                <div id="loginError" class="login-error"></div>
                <div id="loginSuccess" class="login-success"></div>
            </div>
        </div>
    </div>

    <div id="appShell">
        <header>
            <div>
                <nav class="breadcrumbs">
                    <a href="/founder_admin.html">Founder Admin</a>
                    <span class="breadcrumbs-separator">&rsaquo;</span>
                    <span>Lead Email Series</span>
                </nav>
                <h1>Lead Email Series</h1>
                <div class="subtitle">View and manage automated email sequences sent to lead-gen prospects.</div>
            </div>
            <div class="founder-meta">
                <span id="founderEmail"></span>
                <div class="actions">
                    <button class="btn btn-ghost" id="logoutButton" type="button">Logout</button>
                </div>
            </div>
        </header>

        <main class="le-layout">
            <!-- Left: Series list -->
            <aside class="le-sidebar">
                <h3>Email Series</h3>
                <div id="seriesList" class="le-series-list">
                    <p class="le-muted">Loading...</p>
                </div>
            </aside>

            <!-- Middle: Email timeline -->
            <section class="le-main">
                <div id="emptyState" class="le-empty">
                    <p>Select an email series to view details.</p>
                </div>

                <div id="seriesDetail" style="display:none;">
                    <div class="le-detail-header">
                        <div>
                            <h2 id="detailClientName"></h2>
                            <p class="le-muted" id="detailEmail"></p>
                        </div>
                        <div class="le-detail-actions">
                            <button id="pauseBtn" class="btn btn-sm">Pause Series</button>
                            <button id="resumeBtn" class="btn btn-sm">Resume Series</button>
                        </div>
                    </div>

                    <div class="le-tabs">
                        <button class="le-tab active" data-tab="emails">Emails</button>
                        <button class="le-tab" data-tab="deck">Deck</button>
                        <button class="le-tab" data-tab="analysis">Full Analysis</button>
                    </div>

                    <div id="tab-emails" class="le-tab-content">
                        <div id="emailTimeline" class="le-email-list"></div>
                    </div>

                    <div id="tab-deck" class="le-tab-content" style="display:none;">
                        <div id="gammaLink" style="margin-bottom:12px;"></div>
                        <div id="deckContent" class="le-markdown-preview"></div>
                    </div>

                    <div id="tab-analysis" class="le-tab-content" style="display:none;">
                        <div id="analysisContent" class="le-markdown-preview"></div>
                    </div>
                </div>
            </section>

            <!-- Right: Email preview -->
            <aside class="le-preview" id="emailPreviewPanel" style="display:none;">
                <div class="le-preview-header">
                    <h3>Email Preview</h3>
                    <span class="le-muted" id="previewMeta"></span>
                </div>
                <div class="le-preview-envelope">
                    <div class="le-preview-subject" id="previewSubject"></div>
                    <div class="le-preview-preheader" id="previewPreheader"></div>
                </div>
                <div class="le-preview-body" id="previewBody"></div>
            </aside>
        </main>
    </div>

    <script>
        const API = window.APP_CONFIG?.API_BASE_URL || 'http://localhost:8000';
        const hdrs = () => Auth.getAuthHeaders();
        const esc = (s) => {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        };
        let currentRunId = null;
        let currentEmails = [];

        async function loadSeries() {
            try {
                const res = await fetch(`${API}/api/founder-admin/lead-emails`, { headers: hdrs() });
                if (!res.ok) return;
                const data = await res.json();
                const list = document.getElementById('seriesList');
                if (!data.length) { list.innerHTML = '<p class="le-muted">No email series yet.</p>'; return; }
                list.innerHTML = data.map(s => `
                    <div class="le-series-card" data-run-id="${s.run_id}">
                        <div class="le-series-name">${esc(s.client_name)}</div>
                        <div class="le-muted">${esc(s.email_address)}</div>
                        <div class="le-series-stats">
                            <span class="le-stat-sent">${s.sent_count} sent</span>
                            <span class="le-stat-queued">${s.queued_count} queued</span>
                            ${s.paused_count ? `<span class="le-stat-paused">${s.paused_count} paused</span>` : ''}
                        </div>
                    </div>
                `).join('');
                list.querySelectorAll('.le-series-card').forEach(card => {
                    card.addEventListener('click', () => loadDetail(card.dataset.runId));
                });
            } catch (e) { console.error('Failed to load series:', e); }
        }

        async function loadDetail(runId) {
            currentRunId = runId;
            document.querySelectorAll('.le-series-card').forEach(c => c.classList.toggle('active', c.dataset.runId === runId));

            try {
                const res = await fetch(`${API}/api/founder-admin/lead-emails/${runId}`, { headers: hdrs() });
                if (!res.ok) return;
                const data = await res.json();
                currentEmails = data.emails;

                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('seriesDetail').style.display = '';
                document.getElementById('detailClientName').textContent = data.company_name || data.client_name;
                document.getElementById('detailEmail').textContent = data.email_address;

                // Emails timeline
                const timeline = document.getElementById('emailTimeline');
                timeline.innerHTML = data.emails.map((em, i) => `
                    <div class="le-email-row ${em.status}" data-idx="${i}">
                        <div class="le-email-row-top">
                            <span class="le-email-seq">Email ${em.sequence_number}</span>
                            <span class="le-badge le-badge-${em.status}">${em.status}</span>
                            <span class="le-muted le-email-date">${em.scheduled_for ? new Date(em.scheduled_for).toLocaleDateString('en-GB', {day:'numeric',month:'short'}) : ''}</span>
                        </div>
                        <div class="le-email-subject">${esc(em.subject)}</div>
                        ${em.sent_at ? `<div class="le-muted">Sent ${new Date(em.sent_at).toLocaleString('en-GB', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>` : ''}
                        ${em.error_message ? `<div class="le-error">${esc(em.error_message)}</div>` : ''}
                        <div class="le-email-row-actions">
                            ${em.status === 'queued' || em.status === 'paused' ? `<button class="btn btn-xs btn-ghost" onclick="cancelEmail('${em.id}')">Cancel</button>` : ''}
                        </div>
                    </div>
                `).join('');

                // Click to preview
                timeline.querySelectorAll('.le-email-row').forEach(row => {
                    row.addEventListener('click', (e) => {
                        if (e.target.tagName === 'BUTTON') return;
                        timeline.querySelectorAll('.le-email-row').forEach(r => r.classList.remove('selected'));
                        row.classList.add('selected');
                        showPreview(parseInt(row.dataset.idx));
                    });
                });

                // Deck
                document.getElementById('deckContent').textContent = data.deck_markdown || 'No deck content available.';
                const deckLinks = [];
                if (data.gamma_url) deckLinks.push(`<a href="${data.gamma_url}" target="_blank" class="btn btn-sm">View Gamma Deck &rarr;</a>`);
                if (data.pdf_url) deckLinks.push(`<a href="${data.pdf_url}" target="_blank" class="btn btn-sm">Download PDF &darr;</a>`);
                document.getElementById('gammaLink').innerHTML = deckLinks.join(' ');

                // Analysis
                document.getElementById('analysisContent').textContent = data.voc_markdown || 'No analysis available.';

                // Auto-preview first email
                if (data.emails.length) {
                    timeline.querySelector('.le-email-row')?.classList.add('selected');
                    showPreview(0);
                }

            } catch (e) { console.error('Failed to load detail:', e); }
        }

        function showPreview(idx) {
            const em = currentEmails[idx];
            if (!em) return;
            const panel = document.getElementById('emailPreviewPanel');
            panel.style.display = '';

            document.getElementById('previewMeta').textContent = `Email ${em.sequence_number} · ${em.status}`;
            document.getElementById('previewSubject').textContent = em.subject;
            document.getElementById('previewPreheader').textContent = em.preview_text || '';

            const td = em.template_data || {};
            const sections = td.body_sections || [];
            let bodyHtml = '';
            sections.forEach(sec => {
                if (sec.type === 'verbatim') {
                    bodyHtml += `<blockquote><em>"${esc(sec.content)}"</em>${sec.attribution ? `<br><span class="le-muted">${esc(sec.attribution)}</span>` : ''}</blockquote>`;
                } else if (sec.type === 'stat') {
                    bodyHtml += `<div class="le-preview-stat">${esc(sec.content)}</div>`;
                } else if (sec.type === 'cta') {
                    bodyHtml += `<div class="le-preview-cta">${esc(sec.content)}</div>`;
                } else {
                    bodyHtml += `<p>${esc(sec.content)}</p>`;
                }
            });
            if (!bodyHtml && em.extra_data?.strategic_intent) {
                bodyHtml = `<p class="le-muted"><em>Intent: ${esc(em.extra_data.strategic_intent)}</em></p>`;
            }
            document.getElementById('previewBody').innerHTML = bodyHtml || '<p class="le-muted">No content available.</p>';
        }

        // Tabs
        document.querySelectorAll('.le-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.le-tab').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.le-tab-content').forEach(c => c.style.display = 'none');
                btn.classList.add('active');
                document.getElementById(`tab-${btn.dataset.tab}`).style.display = '';
            });
        });

        // Pause / Resume
        document.getElementById('pauseBtn').addEventListener('click', async () => {
            if (!currentRunId) return;
            await fetch(`${API}/api/founder-admin/lead-emails/${currentRunId}/pause`, { method: 'POST', headers: hdrs() });
            loadDetail(currentRunId);
        });
        document.getElementById('resumeBtn').addEventListener('click', async () => {
            if (!currentRunId) return;
            await fetch(`${API}/api/founder-admin/lead-emails/${currentRunId}/resume`, { method: 'POST', headers: hdrs() });
            loadDetail(currentRunId);
        });

        // Cancel
        window.cancelEmail = async (emailId) => {
            await fetch(`${API}/api/founder-admin/lead-emails/${emailId}/cancel`, { method: 'POST', headers: hdrs() });
            if (currentRunId) loadDetail(currentRunId);
        };

        // Init
        Auth.checkAuth().then((authenticated) => {
            if (!authenticated) return;
            const userInfo = Auth.getStoredUserInfo();
            if (!userInfo?.is_founder) {
                Auth.showLogin();
                return;
            }
            Auth.hideLogin();
            document.getElementById('founderEmail').textContent = userInfo.email;
            loadSeries();
        });
        document.getElementById('logoutButton')?.addEventListener('click', () => Auth.handleLogout());
    </script>
</body>
</html>
