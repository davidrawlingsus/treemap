name = "thank-you-survey"
uid = "36589f62-9892-39cb-2f34-f27a46d18b634b74a298"
type = "ui_extension"
api_version = "2025-10"

[[extensions]]
name = "thank-you-survey"
handle = "thank-you-survey"
type = "ui_extension"

[[extensions.targeting]]
target = "purchase.thank-you.block.render"
module = "./src/ThankYouPageSurvey.jsx"

[[extensions.targeting]]
target = "customer-account.order-status.block.render"
module = "./src/OrderStatusPageSurvey.jsx"

[extensions.capabilities]
network_access = true
api_access = true

[[extensions.settings.fields]]
key = "survey_title"
type = "single_line_text_field"
name = "Survey title"
description = "Displayed at the top of the survey block."

[[extensions.settings.fields]]
key = "survey_description"
type = "single_line_text_field"
name = "Survey description (optional)"
description = "Leave empty to hide the intro text."

[[extensions.settings.fields]]
key = "q1_type"
type = "single_line_text_field"
name = "Q1 type"
description = "choice_list, text, or textarea"

[[extensions.settings.fields]]
key = "q1_text"
type = "single_line_text_field"
name = "Q1 text"

[[extensions.settings.fields]]
key = "q1_required"
type = "boolean"
name = "Q1 required"

[[extensions.settings.fields]]
key = "q1_options"
type = "single_line_text_field"
name = "Q1 options (comma-separated)"
description = "Used when Q1 type is choice_list"

[[extensions.settings.fields]]
key = "q2_type"
