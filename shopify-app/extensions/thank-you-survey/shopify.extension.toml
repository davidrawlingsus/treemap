name = "Step 2 question"

[[extensions.settings.fields]]
key = "question_step_3"
type = "single_line_text_field"
name = "Step 3 question (optional)"

[[extensions.settings.fields]]
key = "submit_label"
type = "single_line_text_field"
name = "Submit button label"

[[extensions.settings.fields]]
key = "success_message"
type = "single_line_text_field"
name = "Success message"

[[extensions.settings.fields]]
key = "api_base_url"
type = "single_line_text_field"
name = "Shopify app API base URL"
description = "Example: https://your-shopify-app-service.com"
