<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founder Admin - Pipeline Dashboard</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/styles/founder-admin.css">
    <link rel="stylesheet" href="/styles/founder-pipeline-dashboard.css">
    <script src="/config.js"></script>
    <script src="/auth.js"></script>
</head>
<body>
    <div id="loginOverlay" class="login-overlay hidden">
        <div class="login-container">
            <div id="loginFormSection">
                <h2>Sign in</h2>
                <p class="login-subtext">Enter your work email and we'll email you a secure magic link.</p>
                <input type="email" id="loginEmail" placeholder="you@company.com" autocomplete="email">
                <button id="loginButton" type="button">Send Magic Link</button>
                <div id="loginError" class="login-error"></div>
                <div id="loginSuccess" class="login-success"></div>
            </div>
        </div>
    </div>

    <div id="appShell" style="display:none">
        <header>
            <div>
                <nav class="breadcrumbs">
                    <a href="/founder_admin.html">Founder Admin</a>
                    <span class="breadcrumbs-separator">&rsaquo;</span>
                    <span>Pipeline Dashboard</span>
                </nav>
                <h1>Pipeline Dashboard</h1>
            </div>
            <div class="founder-meta">
                <span id="founderEmail"></span>
                <div class="actions">
                    <span id="liveIndicator" class="pd-live">LIVE</span>
                    <select id="daysFilter" class="pd-select">
                        <option value="1">Last 24h</option>
                        <option value="7" selected>Last 7 days</option>
                        <option value="30">Last 30 days</option>
                    </select>
                    <button class="btn btn-ghost" id="logoutButton" type="button">Logout</button>
                </div>
            </div>
        </header>

        <main class="pd-layout">
            <!-- KPI strip -->
            <div class="pd-kpi-strip" id="kpiStrip">
                <div class="pd-kpi">
                    <div class="pd-kpi-label">Total Runs</div>
                    <div class="pd-kpi-value" id="statTotal">-</div>
                </div>
                <div class="pd-kpi">
                    <div class="pd-kpi-label">Completed</div>
                    <div class="pd-kpi-value green" id="statCompleted">-</div>
                </div>
                <div class="pd-kpi">
                    <div class="pd-kpi-label">Failed</div>
                    <div class="pd-kpi-value red" id="statFailed">-</div>
                </div>
                <div class="pd-kpi">
                    <div class="pd-kpi-label">In Progress</div>
                    <div class="pd-kpi-value blue" id="statInProgress">-</div>
                </div>
                <div class="pd-kpi">
                    <div class="pd-kpi-label">Hanging</div>
                    <div class="pd-kpi-value orange" id="statHanging">-</div>
                </div>
                <div class="pd-kpi">
                    <div class="pd-kpi-label">Success Rate</div>
                    <div class="pd-kpi-value muted" id="statRate">-</div>
                </div>
            </div>

            <!-- Two-column: funnel + active runs -->
            <div class="pd-columns">
                <!-- Left: Funnel -->
                <div class="pd-panel">
                    <div class="pd-panel-header">
                        <h2>Funnel</h2>
                    </div>
                    <div class="pd-panel-body" id="funnelChart"></div>
                </div>

                <!-- Right: Active / recent runs -->
                <div class="pd-panel">
                    <div class="pd-panel-header">
                        <h2>Runs</h2>
                        <span class="pd-muted" id="runCount"></span>
                    </div>
                    <div class="pd-run-header">
                        <span>Company</span>
                        <span>Status</span>
                        <span>Progress</span>
                        <span>Reviews</span>
                        <span>Time</span>
                        <span>Actions</span>
                    </div>
                    <div class="pd-active-list" id="runsList"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API = window.APP_CONFIG?.API_BASE_URL || 'http://localhost:8000';
        const hdrs = () => Auth.getAuthHeaders();
        let refreshTimer = null;

        const STEP_ORDER = [
            'queued','detecting_platforms','scraping','scraping_trustpilot','scraping_reviews_io','scraping_yotpo','scraping_google_reviews',
            'extracting_context','extracting','building_taxonomy','validating','classifying',
            'generating_ads','generating_analysis','scheduling_emails','completed'
        ];
        // Collapse scraping variants into one slot for the progress bar
        const PROGRESS_STEPS = [
            'scraping','extracting_context','extracting','building_taxonomy','validating',
            'classifying','generating_ads','generating_analysis','scheduling_emails','completed'
        ];

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        function fmtDuration(seconds) {
            if (seconds == null) return '-';
            if (seconds < 60) return `${Math.round(seconds)}s`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ${Math.round(seconds % 60)}s`;
            return `${Math.floor(seconds / 3600)}h ${Math.floor((seconds % 3600) / 60)}m`;
        }

        function fmtTimeAgo(iso) {
            if (!iso) return '-';
            const diff = (Date.now() - new Date(iso).getTime()) / 1000;
            if (diff < 60) return 'just now';
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
            return `${Math.floor(diff / 86400)}d ago`;
        }

        function statusBadge(status, isHanging) {
            let cls = 'pd-status-active';
            if (status === 'completed') cls = 'pd-status-ok';
            else if (status === 'failed') cls = 'pd-status-fail';
            if (isHanging) cls = 'pd-status-hang';
            const label = isHanging ? 'HANGING' : status.replace(/_/g, ' ');
            return `<span class="pd-badge ${cls}">${esc(label)}</span>`;
        }

        function progressDots(status, stepTimes) {
            const completedSteps = new Set(Object.keys(stepTimes || {}));
            // Map scraping variants
            if (['scraping_trustpilot','scraping_reviews_io','scraping_yotpo','scraping_google_reviews'].some(s => completedSteps.has(s))) {
                completedSteps.add('scraping');
            }

            return '<div class="pd-step-progress">' + PROGRESS_STEPS.map(step => {
                let cls = '';
                if (completedSteps.has(step)) cls = 'done';
                else if (status.replace(/_/g, ' ') === step.replace(/_/g, ' ')) cls = 'current';
                return `<div class="pd-step-dot ${cls}" title="${step.replace(/_/g, ' ')}"></div>`;
            }).join('') + '</div>';
        }

        async function loadDashboard() {
            const days = document.getElementById('daysFilter').value;
            try {
                const res = await fetch(`${API}/api/founder-admin/pipeline-dashboard?days=${days}`, { headers: hdrs() });
                if (!res.ok) return;
                const data = await res.json();
                renderKPIs(data.summary);
                renderFunnel(data.funnel, data.summary.total_runs);
                renderRuns(data.runs);
            } catch (e) {
                console.error('Dashboard load failed:', e);
            }
        }

        function renderKPIs(s) {
            document.getElementById('statTotal').textContent = s.total_runs;
            document.getElementById('statCompleted').textContent = s.completed;
            document.getElementById('statFailed').textContent = s.failed;
            document.getElementById('statInProgress').textContent = s.in_progress;
            document.getElementById('statHanging').textContent = s.hanging;
            document.getElementById('statRate').textContent = s.completion_rate + '%';
        }

        function renderFunnel(funnel, total) {
            const container = document.getElementById('funnelChart');
            if (!total) { container.innerHTML = '<div class="pd-empty">No data yet.</div>'; return; }
            // Filter out zero-count steps for cleaner view
            const visible = funnel.filter(f => f.count > 0);
            container.innerHTML = visible.map(f => {
                const pct = Math.round(f.count / total * 100);
                const label = f.step.replace(/_/g, ' ');
                return `<div class="pd-funnel-row">
                    <span class="pd-funnel-label">${esc(label)}</span>
                    <div class="pd-funnel-bar-bg">
                        <div class="pd-funnel-bar" style="width:${pct}%"></div>
                    </div>
                    <span class="pd-funnel-count">${f.count}</span>
                </div>`;
            }).join('');
        }

        function renderRuns(runs) {
            const container = document.getElementById('runsList');
            document.getElementById('runCount').textContent = `${runs.length} runs`;

            if (!runs.length) {
                container.innerHTML = '<div class="pd-empty">No runs in this period.</div>';
                return;
            }

            container.innerHTML = runs.map(r => {
                const hangCls = r.is_hanging ? ' hanging' : '';
                const stepTimes = {};
                (r.steps || []).forEach(s => { stepTimes[s.step] = s.started_at; });

                const actions = [];
                if (r.status === 'failed' || r.is_hanging) {
                    actions.push(`<button class="btn-xs" onclick="retryRun('${r.run_id}')">Retry</button>`);
                }
                if (r.is_hanging) {
                    actions.push(`<button class="btn-xs danger" onclick="cancelRun('${r.run_id}')">Kill</button>`);
                }

                return `<div class="pd-run-row${hangCls}">
                    <div>
                        <div class="pd-run-company">${esc(r.company_name)}</div>
                        <div class="pd-run-domain">${esc(r.company_domain)}</div>
                    </div>
                    <div>${statusBadge(r.status, r.is_hanging)}</div>
                    <div>${progressDots(r.status, stepTimes)}</div>
                    <div>${r.review_count || '-'}</div>
                    <div class="pd-muted">${r.total_seconds ? fmtDuration(r.total_seconds) : fmtTimeAgo(r.created_at)}</div>
                    <div class="pd-run-actions">${actions.join('') || '-'}</div>
                </div>`;
            }).join('');
        }

        window.retryRun = async (runId) => {
            await fetch(`${API}/api/founder-admin/pipeline-dashboard/${runId}/retry`, {
                method: 'POST', headers: hdrs(),
            });
            loadDashboard();
        };

        window.cancelRun = async (runId) => {
            await fetch(`${API}/api/founder-admin/pipeline-dashboard/${runId}/cancel`, {
                method: 'POST', headers: hdrs(),
            });
            loadDashboard();
        };

        document.getElementById('daysFilter').addEventListener('change', () => loadDashboard());

        // Init
        if (typeof Auth === 'undefined') {
            document.body.innerHTML = '<h2 style="padding:40px;color:red;">Auth failed to load.</h2>';
        } else {
            Auth.checkAuth().then((authenticated) => {
                if (!authenticated) { Auth.showLogin(); return; }
                const userInfo = Auth.getStoredUserInfo();
                if (!userInfo?.is_founder) { Auth.showLogin(); return; }
                Auth.hideLogin();
                document.getElementById('appShell').style.display = 'flex';
                document.getElementById('founderEmail').textContent = userInfo.email;
                loadDashboard();
                refreshTimer = setInterval(loadDashboard, 15000);
            });
        }
        document.getElementById('logoutButton')?.addEventListener('click', () => Auth.handleLogout());
    </script>
</body>
</html>
